name: Java CI with Maven

# Kích hoạt Robot chạy tự động mỗi khi có code mới đẩy lên nhánh main hoặc master
on:
  push:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest # Robot sẽ dùng hệ điều hành Linux

    steps:
    # Bước 1: Lấy toàn bộ code của em từ GitHub về máy của Robot
    - name: Checkout mã nguồn
      uses: actions/checkout@v3

    # Bước 2: Cài đặt môi trường Java cho Robot (Ví dụ bản 11, em dùng bản 8 hay 17 thì sửa số nhé)
    - name: Cài đặt JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21' 
        distribution: 'temurin'
        cache: maven # Giúp tăng tốc tải thư viện ở các lần chạy sau

    # Bước 3: Ra lệnh cho Maven tự động tải thư viện, build project và chạy toàn bộ file Test
    - name: Chạy Unit Test tự động bằng Maven
      run: mvn clean test